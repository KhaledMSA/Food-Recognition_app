name: food_recognition_app
description: Food Recognition and Nutrition Analysis - Graduation Project

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client for API calls
  http: ^1.2.0

  # Image picking from camera and gallery
  image_picker: ^1.0.7

  # State management
  provider: ^6.1.2

  # Local storage for auth token
  shared_preferences: ^2.2.2

  # Better date formatting
  intl: ^0.19.0

  # Cached network images
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.6
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
